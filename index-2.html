<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>June Gentry</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fdf6ee;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── PASSWORD SCREEN ── */
    #lock-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    #lock-screen h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: #3a3028;
      letter-spacing: 0.04em;
      margin-bottom: 2rem;
      font-weight: normal;
    }

    #lock-screen input {
      border: 1.5px solid #c8a97e;
      border-radius: 4px;
      padding: 0.75rem 1.25rem;
      font-size: 1rem;
      font-family: inherit;
      background: #fff;
      color: #3a3028;
      outline: none;
      width: 220px;
      text-align: center;
      letter-spacing: 0.1em;
    }

    #lock-screen input:focus {
      border-color: #a0724a;
    }

    #lock-screen button {
      margin-top: 1rem;
      background: #a0724a;
      color: #fdf6ee;
      border: none;
      border-radius: 4px;
      padding: 0.75rem 2rem;
      font-size: 0.95rem;
      font-family: inherit;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s;
    }

    #lock-screen button:hover { background: #86603e; }

    #error-msg {
      color: #b94a48;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      min-height: 1.2em;
      letter-spacing: 0.04em;
    }

    /* ── MAIN SITE ── */
    #site {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    #site img {
      width: 100%;
      max-width: 520px;
      border-radius: 6px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.13);
      display: block;
    }

    #site h1 {
      margin-top: 2rem;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.1rem, 4vw, 2rem);
      color: #3a3028;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <!-- PASSWORD SCREEN -->
  <div id="lock-screen">
    <h1>Enter password to continue</h1>
    <input type="password" id="pwd-input" placeholder="password" autocomplete="off" />
    <button onclick="checkPassword()">Enter</button>
    <p id="error-msg"></p>
  </div>

  <!-- MAIN SITE -->
  <div id="site">
    <img src="IMG_7398.jpg" alt="June's summer photo" />
    <h1>June's Summer is in Session!</h1>
    <p style="font-size: 2rem; margin-top: 1rem;">🌊</p>
  </div>

  <script>
    // ── Change the password below ──
    const SITE_PASSWORD = "keaton";

    const SESSION_KEY = "jg_unlocked";

    function checkPassword() {
      const input = document.getElementById("pwd-input").value;
      if (input === SITE_PASSWORD) {
        sessionStorage.setItem(SESSION_KEY, "1");
        showSite();
      } else {
        document.getElementById("error-msg").textContent = "Incorrect password — try again.";
        document.getElementById("pwd-input").value = "";
        document.getElementById("pwd-input").focus();
      }
    }

    function showSite() {
      document.getElementById("lock-screen").style.display = "none";
      document.getElementById("site").style.display = "flex";
    }

    // Allow Enter key on password field
    document.getElementById("pwd-input").addEventListener("keydown", function(e) {
      if (e.key === "Enter") checkPassword();
    });

    // Stay unlocked for the browser session
    if (sessionStorage.getItem(SESSION_KEY) === "1") showSite();
  </script>

</body>
</html>
